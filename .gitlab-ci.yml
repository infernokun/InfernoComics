        - docker-compose.yml

deploy:
  stage: deploy
  image: ubuntu:22.04
  before_script:
    - apt-get -yq update
    - apt-get -yqq install openssh-client iproute2 || { echo "SSH client installation failed"; exit 1; }
    - mkdir -p ~/.ssh
    - install -m 600 -D /dev/null ~/.ssh/id_rsa
    - echo "$STAGE_SERVER_PRIVATE_KEY" | base64 --decode > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$STAGE_SERVER_HOST" >> ~/.ssh/known_hosts
    - export DEPLOY_PATH="/home/$STAGE_SERVER_USER/inferno-comics"
  script:
    - echo "Testing SSH connectivity..."
    - ssh -i ~/.ssh/id_rsa "$STAGE_SERVER_USER@$STAGE_SERVER_HOST" "echo Connected"
    - ssh -i ~/.ssh/id_rsa "$STAGE_SERVER_USER@$STAGE_SERVER_HOST" "mkdir -p $DEPLOY_PATH"
    - if [ ! -f docker-compose.yml ]; then echo "docker-compose.yml not found"; exit 1; fi
    - echo "Checking if docker-compose.yml exists on server..."
    - if ssh -i ~/.ssh/id_rsa "$STAGE_SERVER_USER@$STAGE_SERVER_HOST" "test -f $DEPLOY_PATH/docker-compose.yml"; then
        echo "docker-compose.yml already exists on server, skipping copy";
      else
        echo "docker-compose.yml not found on server, copying...";
        scp -i ~/.ssh/id_rsa -r docker-compose.yml "$STAGE_SERVER_USER@$STAGE_SERVER_HOST:$DEPLOY_PATH/.";
      fi
    # Only restart services that were actually built
    - |
      SERVICES_TO_RESTART=""
      if [ -n "$BUILT_REST" ]; then
        SERVICES_TO_RESTART="$SERVICES_TO_RESTART inferno-comics-rest"
      fi
      if [ -n "$BUILT_RECOG" ]; then
        SERVICES_TO_RESTART="$SERVICES_TO_RESTART inferno-comics-recog"
      fi
      if [ -n "$BUILT_WEB" ]; then
        SERVICES_TO_RESTART="$SERVICES_TO_RESTART inferno-comics-web"
      fi

      if [ -n "$SERVICES_TO_RESTART" ]; then
        echo "Restarting services: $SERVICES_TO_RESTART"
        ssh -i ~/.ssh/id_rsa "$STAGE_SERVER_USER@$STAGE_SERVER_HOST" "echo $DOCKER_HUB_ACCESS_TOKEN | docker login -u $DOCKER_HUB_USERNAME --password-stdin && cd \"$DEPLOY_PATH\" && docker compose pull $SERVICES_TO_RESTART && docker compose up -d $SERVICES_TO_RESTART"
      else
        echo "No services need to be restarted"
      fi
  after_script:
    - rm -rf ~/.ssh
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - job: build-rest
      optional: true
    - job: build-recog
      optional: true
    - job: build-web
      optional: true

create-tag:
  stage: release
  image: alpine:latest
  before_script:
    - apk add --no-cache git
    - git config user.email "ci@gitlab.com"
    - git config user.name "GitLab CI"
    - git remote set-url origin "https://oauth2:${PROJECT_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - |
      set -euo pipefail
      git fetch --tags origin 2>/dev/null || true
      LATEST_TAG=$(git tag -l "v*" --sort=-version:refname | head -n1)

      # Get current app version
      if [ -n "$LATEST_TAG" ]; then
        APP_VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
        TAG_MSG=$(git tag -l --format='%(contents)' "$LATEST_TAG")
        echo "Latest tag: $LATEST_TAG"
      else
        APP_VERSION="0.1.0"
        TAG_MSG=""
        echo "No existing tags, starting at v0.1.0"
      fi

      # Bump app version (always patch)
      MAJOR=$(echo "$APP_VERSION" | cut -d. -f1)
      MINOR=$(echo "$APP_VERSION" | cut -d. -f2)
      PATCH=$(echo "$APP_VERSION" | cut -d. -f3)
      PATCH=$((PATCH + 1))
      NEW_APP_VERSION="${MAJOR}.${MINOR}.${PATCH}"

      # For each service: use new version from build if built, otherwise carry forward from previous tag
      if [ -n "${VERSION_REST:-}" ] && [ -n "${BUILT_REST:-}" ]; then
        SVC_REST="$VERSION_REST"
      elif [ -n "$TAG_MSG" ]; then
        SVC_REST=$(echo "$TAG_MSG" | grep "inferno-comics-rest:" | sed 's/.*: v//' | tr -d '[:space:]')
      fi
      SVC_REST="${SVC_REST:-0.0.0}"

      if [ -n "${VERSION_RECOG:-}" ] && [ -n "${BUILT_RECOG:-}" ]; then
        SVC_RECOG="$VERSION_RECOG"
      elif [ -n "$TAG_MSG" ]; then
        SVC_RECOG=$(echo "$TAG_MSG" | grep "inferno-comics-recog:" | sed 's/.*: v//' | tr -d '[:space:]')
      fi
      SVC_RECOG="${SVC_RECOG:-0.0.0}"

      if [ -n "${VERSION_WEB:-}" ] && [ -n "${BUILT_WEB:-}" ]; then
        SVC_WEB="$VERSION_WEB"
      elif [ -n "$TAG_MSG" ]; then
        SVC_WEB=$(echo "$TAG_MSG" | grep "inferno-comics-web:" | sed 's/.*: v//' | tr -d '[:space:]')
      fi
      SVC_WEB="${SVC_WEB:-0.0.0}"

      # Create tag with composite message
      NEW_TAG="v${NEW_APP_VERSION}"
      TAG_MESSAGE="InfernoComics v${NEW_APP_VERSION}

      inferno-comics-rest: v${SVC_REST}
      inferno-comics-web: v${SVC_WEB}
      inferno-comics-recog: v${SVC_RECOG}"

      if git ls-remote --tags origin "refs/tags/$NEW_TAG" | grep -q "$NEW_TAG"; then
        echo "Tag $NEW_TAG already exists on remote, skipping"
      else
        echo "Creating tag: $NEW_TAG"
        echo "$TAG_MESSAGE"
        git tag -a "$NEW_TAG" -m "$TAG_MESSAGE" "$CI_COMMIT_SHA"
        git push origin "$NEW_TAG"
      fi
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - job: build-rest
      optional: true
    - job: build-recog
      optional: true
    - job: build-web
      optional: true

release:
  stage: release
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq git
  script:
    - |
      set -euo pipefail
      echo "Creating release for $CI_COMMIT_TAG"
      git fetch --tags origin 2>/dev/null || true
      TAG_MSG=$(git tag -l --format='%(contents)' "$CI_COMMIT_TAG")
      RESPONSE=$(curl -sf --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$(jq -n \
          --arg tag "$CI_COMMIT_TAG" \
          --arg name "Release $CI_COMMIT_TAG" \
          --arg desc "$TAG_MSG" \
          '{tag_name: $tag, name: $name, description: $desc}')" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")
      echo "Release created: $(echo "$RESPONSE" | jq -r '.name')"
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

stages:
  - build
  - deploy
  - release

variables:
  DOCKER_HOST: "unix:///var/run/docker.sock"
  GIT_DEPTH: 0
  GIT_STRATEGY: clone
  BUMP_TYPE: ""

build-rest:
  stage: build
  image: docker:26.1.4
  before_script:
    - echo $DOCKER_HUB_ACCESS_TOKEN | docker login -u ${DOCKER_HUB_USERNAME} --password-stdin
    - apk add --no-cache nodejs npm bash jq git curl
  script:
    - |
      set -euo pipefail
      SERVICE_DIR="inferno-comics-rest"
      FALLBACK_VERSION=$(jq -r .version ${SERVICE_DIR}/package.json)

      # Get current service version from latest app tag message
      git fetch --tags origin 2>/dev/null || true
      LATEST_TAG=$(git tag -l "v*" --sort=-version:refname | head -n1)

      if [ -n "$LATEST_TAG" ]; then
        TAG_MSG=$(git tag -l --format='%(contents)' "$LATEST_TAG")
        CURRENT_VERSION=$(echo "$TAG_MSG" | grep "inferno-comics-rest:" | sed 's/.*: v//' | tr -d '[:space:]')
      fi

      if [ -z "${CURRENT_VERSION:-}" ]; then
        CURRENT_VERSION="$FALLBACK_VERSION"
        echo "No version found in tags, using package.json fallback: $CURRENT_VERSION"
      else
        echo "Found version in tag $LATEST_TAG: $CURRENT_VERSION"
      fi

      # Determine bump type: CI variable > MR labels > default (patch)
      RESOLVED_BUMP="${BUMP_TYPE:-}"

      if [ -z "$RESOLVED_BUMP" ]; then
        MR_RESPONSE=$(curl -sf --header "PRIVATE-TOKEN: ${PROJECT_ACCESS_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/commits/${CI_COMMIT_SHA}/merge_requests" \
          2>/dev/null || echo "[]")

        MR_LABELS=$(echo "$MR_RESPONSE" | jq -r '.[0].labels // [] | .[]' 2>/dev/null || echo "")

        if echo "$MR_LABELS" | grep -qx "bump:major"; then
          RESOLVED_BUMP="major"
          echo "MR label detected: bump:major"
        elif echo "$MR_LABELS" | grep -qx "bump:minor"; then
          RESOLVED_BUMP="minor"
          echo "MR label detected: bump:minor"
        fi
      fi

      RESOLVED_BUMP="${RESOLVED_BUMP:-patch}"
      echo "Bump type resolved to: $RESOLVED_BUMP"

      # Calculate new version
      MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
      MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
      PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
      case "$RESOLVED_BUMP" in
        major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
        minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
        patch) PATCH=$((PATCH + 1)) ;;
        *)     PATCH=$((PATCH + 1)) ;;
      esac
      NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
      echo "Version bump: $CURRENT_VERSION -> $NEW_VERSION"

      # Update package.json in CI workspace (not committed)
      cd "$SERVICE_DIR"
      jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp
      mv package.json.tmp package.json

      # Build Docker image
      npm run docker:build

      # Export version and built flag
      cd ..
      echo "BUILT_REST=true" >> build.env
      echo "VERSION_REST=$NEW_VERSION" >> build.env
  artifacts:
    reports:
      dotenv: build.env
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - inferno-comics-rest/**/*
        - docker-compose.yml


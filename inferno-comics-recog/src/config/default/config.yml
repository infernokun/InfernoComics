# ==============================================================================
# Comic Matcher Configuration
# ==============================================================================

# ------------------------------------------------------------------------------
# GLOBAL SETTINGS (applies to all matcher types)
# ------------------------------------------------------------------------------

# Matcher Type: "embedding" (CLIP-based) or "feature" (SIFT/ORB/AKAZE/KAZE)
#   - embedding: Recommended for camera-to-digital image comparison
#   - feature: Traditional keypoint matching (legacy)
matcher_type: "embedding"

# Performance level preset to use (see presets below)
# For embedding: "fast", "balanced", "quality", "high_accuracy"
# For feature: "minimal", "fast", "balanced", "high_performance", "akaze_focused"
performance_level: "balanced"

# Number of top results to return
result_batch: 10

# Minimum similarity score (0-100% or 0.0-1.0)
similarity_threshold: 55%


# ==============================================================================
# EMBEDDING MATCHER SETTINGS (used when matcher_type is "embedding")
# ==============================================================================
# CLIP-based matching using neural network embeddings
# Better for: camera photos, varying lighting, different angles
# ------------------------------------------------------------------------------

embedding:
  # Available models (from fastest to most accurate):
  #   - ViT-B-32: Balanced speed/accuracy, good for CPU (default)
  #   - RN50: ResNet-based, efficient on CPU
  #   - ViT-B-16: Higher accuracy, moderate speed
  #   - ViT-L-14: Best accuracy, slowest (consider GPU)
  model: "ViT-B-32"

  # Device: "cpu" or "cuda" (if GPU available)
  device: "cpu"

# Embedding matcher presets
embedding_presets:
  fast:
    embedding:
      model: "ViT-B-32"
      device: "cpu"
    image_size: 600
    max_workers: 4
    options:
      use_comic_detection: false
      use_advanced_matching: false

  balanced:
    embedding:
      model: "ViT-B-32"
      device: "cpu"
    image_size: 800
    max_workers: 4
    options:
      use_comic_detection: true
      use_advanced_matching: true

  quality:
    embedding:
      model: "ViT-B-16"
      device: "cpu"
    image_size: 1000
    max_workers: 4
    options:
      use_comic_detection: true
      use_advanced_matching: true

  high_accuracy:
    embedding:
      model: "ViT-L-14"
      device: "cpu"
    image_size: 1200
    max_workers: 2
    options:
      use_comic_detection: true
      use_advanced_matching: true


# ==============================================================================
# FEATURE MATCHER SETTINGS (used when matcher_type is "feature")
# ==============================================================================
# Traditional keypoint-based matching using SIFT/ORB/AKAZE/KAZE
# Better for: digital-to-digital matching, controlled conditions
# ------------------------------------------------------------------------------

# Feature detector configuration (feature counts, 0 = disabled)
detectors:
  sift: 1500      # Scale-Invariant Feature Transform (slowest, most robust)
  orb: 1500       # Oriented FAST and Rotated BRIEF (fastest)
  akaze: 800      # Accelerated-KAZE (best accuracy/speed ratio)
  kaze: 400       # KAZE features (non-linear diffusion)

# Weight of each detector in final similarity score (must sum to 1.0)
feature_weights:
  sift: 0.20
  orb: 0.20
  akaze: 0.50     # Star performer for accuracy
  kaze: 0.10

# Feature matcher presets
feature_presets:
  minimal:
    image_size: 300
    max_workers: 1
    detectors:
      sift: 0
      orb: 500
      akaze: 0
      kaze: 0
    feature_weights:
      sift: 0.0
      orb: 1.0
      akaze: 0.0
      kaze: 0.0
    options:
      use_comic_detection: false
      use_advanced_matching: false
      cache_only: true

  fast:
    image_size: 800
    max_workers: 3
    detectors:
      sift: 800
      orb: 1200
      akaze: 600
      kaze: 0
    feature_weights:
      sift: 0.25
      orb: 0.35
      akaze: 0.40
      kaze: 0.0
    options:
      use_comic_detection: true
      use_advanced_matching: true

  balanced:
    image_size: 1000
    max_workers: 4
    detectors:
      sift: 1500
      orb: 1500
      akaze: 800
      kaze: 400
    feature_weights:
      sift: 0.20
      orb: 0.20
      akaze: 0.50
      kaze: 0.10
    options:
      use_comic_detection: true
      use_advanced_matching: true

  high_performance:
    image_size: 1200
    max_workers: 8
    detectors:
      sift: 2500
      orb: 2000
      akaze: 1200
      kaze: 800
    feature_weights:
      sift: 0.25
      orb: 0.20
      akaze: 0.45
      kaze: 0.10
    options:
      use_comic_detection: true
      use_advanced_matching: true

  akaze_focused:
    image_size: 800
    max_workers: 4
    detectors:
      sift: 800
      orb: 800
      akaze: 1000
      kaze: 200
    feature_weights:
      sift: 0.15
      orb: 0.15
      akaze: 0.65
      kaze: 0.05
    options:
      use_comic_detection: true
      use_advanced_matching: true


# ==============================================================================
# SHARED OPTIONS
# ==============================================================================

# Image processing settings
image_size: 800           # Max image dimension (pixels)
max_workers: 4            # Parallel processing threads

# Detection and matching options
options:
  use_comic_detection: true       # Detect and crop comic area from image
  use_advanced_matching: true     # Use geometric verification (feature) / enhanced preprocessing (embedding)
  cache_only: false               # Only use cached results, skip processing
